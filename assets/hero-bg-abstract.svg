<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <!-- Gradients for diagonal streaks -->
    <linearGradient id="streak-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9D7F8" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#DB83EA" stop-opacity="0.85"/>
      <stop offset="65%" stop-color="#7E79E5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#20A5EC" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="streak-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8A4E6" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#9B7AE8" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#6382F0" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="streak-grad-3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DB83EA" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#7E79E5" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#20A5EC" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30"/>
    </filter>

    <!-- Grain texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="1200" height="1200" fill="#07080a"/>

  <!-- Soft ambient glow behind streaks -->
  <ellipse cx="600" cy="580" rx="420" ry="380" fill="url(#streak-grad-1)" opacity="0.12" filter="url(#soft-glow)"/>

  <!-- Diagonal streaks group — rotated 35deg -->
  <g transform="rotate(-35 600 600)">
    <!-- Streak 1 -->
    <rect x="180" y="-100" width="68" height="1500" rx="34" fill="url(#streak-grad-1)" opacity="0.75" filter="url(#glow)"/>
    <!-- Streak 2 -->
    <rect x="280" y="-60" width="58" height="1480" rx="29" fill="url(#streak-grad-2)" opacity="0.82" filter="url(#glow)"/>
    <!-- Streak 3 -->
    <rect x="370" y="-30" width="72" height="1460" rx="36" fill="url(#streak-grad-1)" opacity="0.88" filter="url(#glow)"/>
    <!-- Streak 4 — brightest -->
    <rect x="475" y="-10" width="80" height="1440" rx="40" fill="url(#streak-grad-1)" opacity="0.95" filter="url(#glow)"/>
    <!-- Streak 5 -->
    <rect x="588" y="-20" width="70" height="1450" rx="35" fill="url(#streak-grad-2)" opacity="0.85" filter="url(#glow)"/>
    <!-- Streak 6 -->
    <rect x="690" y="-40" width="62" height="1470" rx="31" fill="url(#streak-grad-3)" opacity="0.78" filter="url(#glow)"/>
    <!-- Streak 7 -->
    <rect x="782" y="-70" width="55" height="1490" rx="28" fill="url(#streak-grad-3)" opacity="0.65" filter="url(#glow)"/>
    <!-- Streak 8 -->
    <rect x="868" y="-90" width="50" height="1500" rx="25" fill="url(#streak-grad-3)" opacity="0.5" filter="url(#glow)"/>
    <!-- Streak 9 — thin accent -->
    <rect x="950" y="-100" width="38" height="1500" rx="19" fill="url(#streak-grad-2)" opacity="0.35" filter="url(#glow)"/>
  </g>

  <!-- Edge vignette -->
  <rect width="1200" height="1200" fill="url(#vignette-radial)" opacity="0.6"/>

  <!-- Radial vignette -->  
  <radialGradient id="vignette-radial" cx="50%" cy="48%" r="55%">
    <stop offset="0%" stop-color="#07080a" stop-opacity="0"/>
    <stop offset="70%" stop-color="#07080a" stop-opacity="0"/>
    <stop offset="100%" stop-color="#07080a" stop-opacity="0.85"/>
  </radialGradient>

  <!-- Subtle grain overlay -->
  <rect width="1200" height="1200" fill="#07080a" opacity="0.06" filter="url(#grain)"/>
</svg>